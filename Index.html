<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Fotogram</title>
		<link rel="stylesheet" href="style.css" />
		<script defer src="script.js"></script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
			rel="stylesheet"
		/>
	</head>
	<body onload="renderImages()">
		<header>
			<img src="media/fotogram.png" class="header-logo" />
			<h1 id="logo">Fotogram</h1>
		</header>
		<main>
			<h1 id="title">Your personal photo album</h1>
			<section id="photo-container"></section>
			<dialog id="photo-highlight"></dialog>
		</main>
		<footer>
			<img src="media/DA_watermark.png" alt="developer akademie logo" class="DA-logo" />
			<p class="footer-p">© 2023 Developer Akademie GmbH</p>
		</footer>
	</body>
</html>
